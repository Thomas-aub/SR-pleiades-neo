# =============================================================================
# preprocessing.yaml — Pléiades NEO SR Preprocessing Pipeline Configuration
# =============================================================================
# Single source of truth for the full three-stage pipeline:
#
#   Stage 1 · pansharpening   data/raw/         →  data/pansharpened/HR/
#   Stage 2 · degradation     pansharpened/HR/  →  data/pansharpened/LR/
#   Stage 3 · tiling          HR/ + LR/         →  data/processed/train|val/
#
# Run with:
#   python preprocessing.py                               # full pipeline
#   python preprocessing.py --stages degradation tiling  # skip pansharpening
#   python preprocessing.py --from-stage tiling          # start from tiling
#   python preprocessing.py --dry-run                    # validate only
# =============================================================================


# ── Directory layout ──────────────────────────────────────────────────────────
# All paths are resolved relative to the working directory unless absolute.
data:
  raw_root:        "data/raw"               # Input PAN + MS-FS source TIFs
  pansharpened_hr: "data/pansharpened/HR"   # Stage 1 output / Stage 2 input
  pansharpened_lr: "data/pansharpened/LR"   # Stage 2 output / Stage 3 input
  processed:       "data/processed"         # Stage 3 output (tiled dataset)


# ── Stage 1 — Pansharpening ───────────────────────────────────────────────────
pansharpening:
  # Fusion method: "brovey" | "simple_mean"
  # brovey:       (R/ΣRG B) × PAN — preserves relative radiance ratios.
  # simple_mean:  (MS + PAN) / 2  — faster, lower contrast.
  method: "brovey"

  # Resampling used when upscaling MS from 1.2 m to PAN 0.3 m resolution.
  # "bilinear" is a good default; "lanczos" is sharper but slower.
  resample_algo: "bilinear"

  # Output bit depth. "uint16" preserves full radiometric depth of PAN.
  output_dtype: "uint16"

  # Suffix appended to the MS filename stem for each pansharpened output.
  output_suffix: "_PANSHARP"

  # GeoTIFF compression for HR outputs.
  # "none" is fastest for writing; use "deflate" to save disk space.
  compress: "none"

  # Use CuPy (CUDA) for Brovey arithmetic.
  # Automatically falls back to NumPy if CuPy is unavailable.
  use_gpu: true

  # Height (in PAN pixels) of each horizontal processing strip.
  # Peak VRAM ≈ chunk_rows × image_width × 3 bands × 4 bytes.
  # Reduce if CUDA OOM; increase (up to image height) for fewer GPU transfers.
  chunk_rows: 2048


# ── Stage 2 — Sensor Degradation ─────────────────────────────────────────────
degradation:
  # Use CuPy (CUDA) for FFT-based MTF blur and spectral misalignment.
  use_gpu: true

  # CUDA device index. Ignored when use_gpu is false.
  gpu_device: 0

  # Internal tile size for processing each HR image (source pixels).
  # Peak VRAM per tile ≈ (tile_size + tile_overlap)² × n_bands × 8 bytes.
  # 4096 requires ~3 GB VRAM for a 3-band uint16 image.
  tile_size: 4096

  # Symmetric overlap between adjacent processing tiles (source pixels).
  # Larger overlap reduces FFT wrap-around artefacts at tile edges.
  tile_overlap: 64

  # GeoTIFF compression for LR outputs.
  compress: "lzw"

  # Skip files whose LR output already exists on disk.
  # Set to true to resume an interrupted degradation run.
  overwrite: false

  # ── Degradation operations (applied in listed order) ──────────────────────
  # Supported ops:
  #   mtf_blur         — anisotropic Gaussian MTF in frequency domain.
  #   downsample       — integer spatial downscale via rasterio reproject.
  #   spectral_misalign— two-component inter-band misregistration (FFT).
  #   add_noise        — zero-mean Gaussian noise on valid pixels.
  pipeline:
    # MTF blur: simulates the optical PSF of a lower-resolution sensor.
    # mtf_nyquist_x/y: MTF value at Nyquist frequency (0 < value < 1).
    # Lower values → stronger blur → harder SR task.
    - op:            mtf_blur
      mtf_nyquist_x: 0.15
      mtf_nyquist_y: 0.15

    # Downsample: spatial scale factor between HR and LR.
    # scale=2 → LR is half the HR resolution in each axis.
    # Must match model.upscale in swinir_finetune.yaml.
    - op:        downsample
      scale:     2
      resampling: "average"   # "average" | "bilinear" | "cubic"

    # Spectral misalignment: simulates PAN–MS co-registration error.
    # global_shift_px: shared [dy, dx] shift in LR pixels for all bands.
    # per_band_sigma_px: independent Gaussian jitter σ per band.
    - op:                spectral_misalign
      global_shift_px:   [0.3, 0.2]
      per_band_sigma_px: 0.15
      seed:              42

    # Gaussian noise: sensor read noise on valid (non-nodata) pixels only.
    # sigma: noise standard deviation in raw DN units (same scale as input).
    - op:   add_noise
      sigma: 2.0
      seed:  42


# ── Stage 3 — Dataset Tiling ──────────────────────────────────────────────────
tiling:
  # HR tile side length in pixels.
  # LR tile = tile_size ÷ scale (scale inferred from file dimensions).
  # Must be a multiple of the SwinIR window_size (default: 8).
  tile_size: 512

  # Fraction of WO_* acquisition groups assigned to the validation set.
  # All files in the same acquisition directory always land in the same split.
  val_ratio: 0.2

  # Random seed for reproducible train/val group assignment.
  seed: 42

  # GeoTIFF compression for output tile files.
  compress: "deflate"

  # Discard tiles whose fraction of non-zero (valid) pixels is below this
  # threshold. Set to 0.0 to keep all tiles including nodata-only ones.
  min_valid_fraction: 0.1

  # Re-tile and overwrite tiles that already exist on disk.
  # Set to true when changing tile_size or stats parameters.
  overwrite: false

  # ── QGIS display statistics ───────────────────────────────────────────────
  # Percentiles used to compute the STATISTICS_MINIMUM / STATISTICS_MAXIMUM
  # tags embedded in every output tile.
  #
  # These tags define the display stretch range in QGIS and other GIS tools.
  # They do NOT alter pixel data — only metadata.
  #
  # Strategy (mirrors tiler.py):
  #   • Statistics are computed once from a full-scene thumbnail before the
  #     tile loop, so every tile from the same source image shares the same
  #     stretch range — adjacent tiles over water and sand look consistent.
  #   • Percentiles (not absolute min/max) exclude outlier pixels:
  #     p1 clips the darkest 1% (nodata, deep shadow);
  #     p99 clips the brightest 1% (sensor hot pixels, specular reflections).
  #   • Zero pixels are excluded — they are the nodata/padding convention
  #     used throughout this pipeline.
  stats_min_percentile: 1.0    # lower display bound (p1 of valid pixels)
  stats_max_percentile: 99.0   # upper display bound (p99 of valid pixels)


# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"    # DEBUG | INFO | WARNING | ERROR

  # Path for a persistent log file. null → console only.
  # Example: "runs/preprocessing.log"
  file: null