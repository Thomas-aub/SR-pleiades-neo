# =============================================================================
# configs/swinir_finetune.yaml — Swin2-MoSE Fine-tuning Configuration
# =============================================================================
# All paths are resolved relative to the project root (directory that contains
# configs/, scripts/, and src/) unless absolute.
#
# Reference:
#   Rossi et al. (2024). "Swin2-MoSE: A New Single Image Super-Resolution
#   Model for Remote Sensing." arXiv:2404.18924.
# =============================================================================


# ── External dependency ───────────────────────────────────────────────────────
# Absolute or relative path to a local clone of the Swin2-MoSE repository.
# The model is imported from swin2_mose_model/model.py inside this directory.
#
# Clone with:
#   git clone -b official_code https://github.com/IMPLabUniPr/swin2-mose swin2-mose
swin2_mose_root: "swin2-mose"


# ── Data ──────────────────────────────────────────────────────────────────────
data:
  # Roots for the tiled dataset produced by build_dataset.py.
  train_hr: "data/processed/train/HR"
  train_lr: "data/processed/train/LR"
  val_hr:   "data/processed/val/HR"
  val_lr:   "data/processed/val/LR"

  # Scale factor between LR and HR tiles (must match build_dataset.py output).
  scale: 2

  # Source image bit depth used for normalisation: 255 (uint8) or 65535 (uint16).
  dtype_max: 65535

  # LR patch size sampled during training.
  # HR patch = lr_patch_size * scale.
  # Must be a multiple of model.window_size (default 8).
  lr_patch_size: 192

  # DataLoader settings.
  num_workers:     12
  pin_memory:      true
  prefetch_factor: 2


# ── Model ─────────────────────────────────────────────────────────────────────
model:
  # Path to a pretrained Swin2-MoSE checkpoint.
  # Download from: https://github.com/IMPLabUniPr/swin2-mose/releases
  # Set to null to train from scratch (not recommended).
  pretrained_path: "pretrained/model-70.pt"

  # Key under which the model weights are stored in the checkpoint dict.
  # Swin2-MoSE release .pt files store the state dict at the top level,
  # so this should be null.  Set to "params" only for KAIR-style checkpoints.
  pretrained_key: null

  # ── Swin2-MoSE architecture (must match the pretrained checkpoint) ────────
  upscale:          2          # SR scale factor
  in_chans:         3          # Number of input channels (RGB = 3)
  img_size:         64         # Training patch size fed to the transformer
  window_size:      8          # Attention window size
  img_range:        1.0        # Pixel value range after normalisation [0, img_range]
  depths:           [6, 6, 6, 6, 6, 6]
  embed_dim:        180
  num_heads:        [6, 6, 6, 6, 6, 6]
  mlp_ratio:        2.0
  upsampler:        "pixelshuffle"   # "pixelshuffle" | "pixelshuffledirect" | ""
  resi_connection:  "1conv"          # "1conv" | "3conv"

  # ── MoE-SM parameters (unique to Swin2-MoSE) ─────────────────────────────
  # Total number of experts inside each S2ML transformer block.
  num_experts: 4
  # Active experts selected per input example via the Top-K gating network.
  k: 2
  # Weight for the MoE load-balancing auxiliary loss (Eq. 2, Rossi et al. 2024).
  # This term encourages uniform expert utilisation and is added to the primary
  # reconstruction loss during training only.
  moe_loss_weight: 0.01


# ── Training ──────────────────────────────────────────────────────────────────
training:
  epochs:     150
  batch_size: 16

  # ── Static freeze (applied for the entire run) ────────────────────────────
  # Ignored when freeze_schedule is defined below.
  # Null → fine-tune all parameters.
  frozen_prefixes: null

  # ── Freeze schedule (staged fine-tuning) ─────────────────────────────────
  # List of phases applied in epoch order.  Each phase has:
  #   until_epoch    : phase is active while epoch < until_epoch.
  #                    null = "for all remaining epochs".
  #   frozen_prefixes: parameter name prefixes to freeze.
  #                    null = unfreeze everything.
  #
  # Swin2-MoSE layer names (use as frozen_prefixes):
  #   patch_embed                — initial patch tokenisation
  #   layers.0 … layers.5       — 6 S2ML transformer stages (backbone)
  #   norm                       — final layer normalisation
  #   conv_after_body            — bridge conv (body → SR head)
  #   conv_before_upsample       — first conv of SR head
  #   upsample                   — pixel-shuffle upsampling block
  #   conv_last                  — final output conv
  #
  # Recommended two-phase strategy:
  #
  #   Phase 1  epochs  0–9  (10 epochs)
  #     Freeze the entire transformer backbone.  Only the SR head trains.
  #     Loss drops quickly; the head adapts to satellite radiometry without
  #     corrupting pretrained MoE-SM features.
  #
  #   Phase 2  epochs 10–199  (190 epochs)
  #     Unfreeze everything.  The transformer backbone and MoE-SM routing
  #     refine their feature extraction for RS textures.
  freeze_schedule:
    - until_epoch:      2
      frozen_prefixes:
        - "patch_embed"
        - "layers.0"
        - "layers.1"
        - "layers.2"
        - "layers.3"
        - "layers.4"
        - "layers.5"
        - "norm"

    - until_epoch:     null   # epoch 10 onwards
      frozen_prefixes: null   # unfreeze all

  # Gradient clipping: max L2 norm of the gradient vector.
  # Null to disable.
  grad_clip_norm: 0.01

  # Mixed-precision training (torch.cuda.amp).
  use_amp: true

  # ── Augmentation ─────────────────────────────────────────────────────────
  augmentation:
    horizontal_flip: true
    vertical_flip:   true
    rot90:           true    # random 90° rotation (0°, 90°, 180°, 270°)


# ── Optimizer ─────────────────────────────────────────────────────────────────
optimizer:
  type:         "adam"
  lr:           2.0e-4
  betas:        [0.9, 0.99]
  weight_decay: 0.0
  eps:          1.0e-8


# ── LR Scheduler ──────────────────────────────────────────────────────────────
scheduler:
  # "multistep" → MultiStepLR
  # "cosine"    → CosineAnnealingLR
  # "none"      → constant LR
  type: "multistep"

  milestones: [80, 120, 160, 180]
  gamma:      0.5

  # CosineAnnealingLR only:
  eta_min: 1.0e-7


# ── Loss ──────────────────────────────────────────────────────────────────────
loss:
  # NCC + SSIM combination loss from Rossi et al. (2024).
  # Avoids over-smoothing artefacts of MSE / Charbonnier losses, which
  # suppress high-frequency textures (edges, rooftops, vegetation boundaries)
  # critical for remote-sensing SR quality.
  #
  # Alternatives: "ncc" | "ssim" | "charbonnier" | "l1" | "mse"
  type:        "ncc_ssim"
  ncc_weight:  0.5          # Equal weighting as in Rossi et al. 2024
  ssim_weight: 0.5
  ncc_eps:     1.0e-8       # Denominator stability for NCCLoss

  # Optional perceptual (VGG) auxiliary loss.  Requires torchvision.
  perceptual:
    enabled: false
    weight:  0.1
    layer:   "relu3_4"


# ── Logging & checkpointing ───────────────────────────────────────────────────
logging:
  run_dir: "runs/swin2mose_finetune"

  # Log a training summary every N iterations (not epochs).
  log_interval_iters: 10

  # Run full validation every N epochs.
  val_interval_epochs: 4

  # Save a checkpoint every N epochs.
  save_interval_epochs: 10

  # Keep only the N most recent periodic checkpoints on disk.
  # The best-model checkpoint is always kept regardless of this limit.
  keep_last_n_checkpoints: 3

  tensorboard: true


# ── Miscellaneous ─────────────────────────────────────────────────────────────
misc:
  seed:   42
  device: "cuda"   # "cuda" | "cpu" | "cuda:1" etc.

  # Path to a training checkpoint to resume from.
  # Overrides pretrained_path for training-state restoration
  # (optimizer, scheduler, epoch).  Set to null to start fresh.
  resume: null